# 프론트만 GitHub Pages(무료)로 배포 — 백엔드는 Render 무료 티어 URL 사용(api.js)
#
# 배포 주소는 항상 "이 코드가 올라가 있는 GitHub 저장소 소유자" 기준입니다.
#   https://<GitHub사용자명>.github.io/<저장소이름>/
# 예: 저장소가 본인 계정(행복한 지구·hopefulearth 등) 아래에 있어야
#     본인 Pages 주소로 열립니다. mogrow24 등 다른 사람 저장소에만 push 하면
#     그 계정 주소로만 배포됩니다.
# 저장소를 본인 계정으로 옮긴 뒤: git remote set-url origin <본인 repo URL>
#
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 빌드
        working-directory: frontend
        env:
          # 저장소 이름과 동일해야 GitHub Pages 경로와 일치합니다
          VITE_BASE: /project-management-chart/
        run: |
          npm ci
          npm run build

      - name: GitHub Pages용 SPA 폴백(404.html) 및 .nojekyll
        run: |
          cp frontend/dist/index.html frontend/dist/404.html
          touch frontend/dist/.nojekyll

      - name: gh-pages 브랜치로 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          force_orphan: true
