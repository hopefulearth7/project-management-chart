# Netlify — 프론트엔드(Vite + React) 배포
# 대시보드에서 "Site settings > Build & deploy" 또는 Git 연동 시 이 파일이 적용됩니다.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# API → Render 백엔드 프록시 (동일 출처로 호출해 브라우저 CORS 완화)
# 반드시 아래 SPA 규칙보다 먼저 둡니다.
[[redirects]]
  from = "/api/*"
  to = "https://project-management-backend-vn80.onrender.com/api/:splat"
  status = 200
  force = true

# React Router: 직접 URL 접속·새로고침 시 404 방지
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
